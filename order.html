<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feisty - Pesan Sekarang</title>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arimo', Arial, sans-serif;
    }
    
    html, body, #app-wrapper {
      height: 100%;
      width: 100%;
    }
    
    #app-wrapper {
      overflow: auto;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 100%);
    }

    header {
      background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
      color: white;
      padding: 12px 20px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    header img {
      height: 70px;
      width: auto;
      object-fit: contain;
    }

    .cart-toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
      color: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255, 69, 0, 0.4);
      z-index: 998;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cart-toggle-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #dc3545;
      color: white;
      font-size: 12px;
      font-weight: bold;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }

    main {
      flex: 1;
      padding: 20px;
      max-width: 100%;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 16px;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #FF4500;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      background: #fee;
      color: #c33;
      padding: 16px;
      border-radius: 8px;
      margin: 16px 0;
      border-left: 4px solid #c33;
      line-height: 1.6;
    }

    .menu-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    @media (min-width: 768px) {
      .menu-container {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        justify-items: center;
      }
    }
    
    @media (min-width: 1024px) {
      .menu-container {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    .menu-item {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .menu-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(255, 69, 0, 0.15);
    }

    .menu-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #FFE0D6 0%, #FFF0E6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
    }

    .menu-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .menu-content {
      padding: 16px;
    }

    .menu-name {
      font-size: 18px;
      font-weight: bold;
      color: #1F2937;
      margin: 0 0 8px 0;
      line-height: 1.3;
    }

    .menu-category {
      display: inline-block;
      background: #FFE0D6;
      color: #DC143C;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .menu-desc {
      font-size: 13px;
      color: #666;
      margin: 8px 0;
      line-height: 1.4;
      height: 40px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .menu-price {
      font-size: 20px;
      font-weight: bold;
      color: #FF4500;
    }

    .menu-price .original-price {
      font-size: 14px;
      color: #999;
      text-decoration: line-through;
      margin-right: 8px;
      font-weight: normal;
    }

    .menu-price .discount-badge {
      display: inline-block;
      background: #dc3545;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
      font-weight: bold;
    }

    .add-btn {
      background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    .cart-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 0;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
      z-index: 999;
      max-height: 45vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .cart-section.open {
      transform: translateY(0);
    }

    .cart-title {
      font-size: 18px;
      font-weight: bold;
      color: #1F2937;
      margin: 0;
      padding: 16px 20px 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px;
    }

    .cart-close-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      padding: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .cart-close-btn:hover {
      background: #f0f0f0;
    }

    .cart-empty {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 15px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-info {
      flex: 1;
      min-width: 0;
    }

    .cart-item-name {
      font-weight: 600;
      color: #1F2937;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .cart-item-price {
      color: #FF4500;
      font-size: 14px;
      font-weight: bold;
    }

    .cart-qty {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 8px;
    }

    .qty-btn {
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #FF4500;
      font-size: 18px;
      transition: all 0.2s;
    }

    .qty-btn:hover {
      background: #FF4500;
      color: white;
      border-color: #FF4500;
    }

    .cart-remove {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .cart-remove:hover {
      background: #dc2626;
      color: white;
    }

    .cart-summary {
      margin-top: 0;
      padding: 16px 20px 20px 20px;
      border-top: 2px solid #FF4500;
      flex-shrink: 0;
      background: linear-gradient(to bottom, #fff 0%, #fff9f5 100%);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 15px;
      font-size: 15px;
      color: #4b5563;
    }

    .summary-row.total {
      font-size: 20px;
      font-weight: bold;
      color: #FF4500;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #e5e5e5;
    }

    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 69, 0, 0.4);
    }

    .checkout-btn:active {
      transform: translateY(0);
    }

    .checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Pre-filled customer info banner */
    .customer-info-banner {
      background: linear-gradient(135deg, #f0fff4 0%, #dcfce7 100%);
      border: 1px solid #86efac;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .customer-info-banner .avatar {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .customer-info-banner .info {
      flex: 1;
    }

    .customer-info-banner .name {
      font-weight: bold;
      color: #1F2937;
      font-size: 16px;
    }

    .customer-info-banner .phone {
      color: #666;
      font-size: 13px;
    }

    .customer-info-banner .badge {
      background: #10B981;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 </head>
 <body>
  <div id="app-wrapper">
   <header><img src="https://imgur.com/E9ya4d5.png" alt="Logo" loading="lazy" onerror="console.error('Logo failed to load:', this.src); this.style.display='none';">
   </header>
   <button class="cart-toggle-btn" id="cart-toggle-btn" onclick="toggleCart()">
    <span style="font-size: 24px;">🛒</span>
    <span class="cart-badge" id="cart-badge" style="display: none;">0</span>
   </button>
   <main>
    <!-- Customer Info Banner (will be shown if pre-filled) -->
    <div id="customer-banner" style="display: none;"></div>
    
    <div id="menu-list" class="menu-container">
     <div class="loading">
      <div class="spinner"></div>
      <p>MEMUAN MENU...</p>
     </div>
    </div>
   </main>
   <div class="cart-overlay" id="cart-overlay"></div>
   <div class="cart-section" id="cart-section">
    <h2 class="cart-title">KERANJANG <button class="cart-close-btn" id="cart-close-btn">x</button></h2>
    <div id="cart-items" class="cart-empty">
     KOSONG
    </div>
    <div id="cart-summary" style="display: none;">
     <div class="summary-row"><span>Subtotal</span> <span id="subtotal">Rp 0</span>
     </div>
     <div class="summary-row"><span>Ongkir</span> <span id="shipping-cost">Rp 0</span>
     </div>
     <div class="summary-row total"><span>Total</span> <span id="total">Rp 0</span>
     </div><button class="checkout-btn" id="checkout-btn">PILIH METODE PEMBAYARAN</button>
    </div>
   </div>
  </div>
  <script>
    // URL GAS - ambil dari config atau parameter URL
    const urlParams = new URLSearchParams(window.location.search);
    // GAS URL from parameter (set by bot), or try to get from parent page config, or use default
    let gasUrl = urlParams.get('gas') || '';
    
    // If no gas param, try to get from localStorage (set by index.html)
    if (!gasUrl) {
      try {
        const storedGasUrl = localStorage.getItem('feisty_gas_url');
        if (storedGasUrl) gasUrl = storedGasUrl;
      } catch(e) {}
    }
    
    // Fallback to default
    if (!gasUrl) {
      gasUrl = 'https://script.google.com/macros/s/1ntEFZH4kaT5gs9e58BEBPbykBZDp42TrzOiM0X3XfvIK0Lssw7lzAS_q/exec';
    }

    // Initialize config - load from config.js and server
    const config = {
      qris_api_key: typeof FeistyConfig !== 'undefined' ? (FeistyConfig.QRIS_API_KEY || '3a8ad4e906094138a9f6adf8bf920e6907706444bb2546ccbadb3047bb8b09b6') : '3a8ad4e906094138a9f6adf8bf920e6907706444bb2546ccbadb3047bb8b09b6',
      qris_fee: 1000,
      ipaymu_key: typeof FeistyConfig !== 'undefined' ? (FeistyConfig.IPAYMU_KEY || '') : '',
      gas_url_bot: gasUrl,
      base_shipping_cost: 10000,
      shipping_cost_per_km: 2000,
      free_shipping_min_distance: 5,
      // Payment method settings - loaded from config
      enable_cod: true,
      enable_qris: false,
      enable_ipaymu: true
    };

    // Ambil customer info dari URL parameters
    const customerPhone = urlParams.get('phone') || '';
    const customerName = urlParams.get('nama') || '';
    
    // Tampilkan banner customer jika ada
    if (customerPhone || customerName) {
      const banner = document.getElementById('customer-banner');
      const initial = customerName ? customerName.charAt(0).toUpperCase() : '?';
      banner.innerHTML = `
        <div class="customer-info-banner">
          <div class="avatar">${initial}</div>
          <div class="info">
            <div class="name">${escapeHtml(customerName || 'Pelanggan')}</div>
            <div class="phone">${escapeHtml(customerPhone)}</div>
          </div>
          <div class="badge">TERVERIFIKASI</div>
        </div>
      `;
      banner.style.display = 'block';
    }

    // Lokasi toko akan diambil dari data GAS
    let store_latitude = -6.2088;
    let store_longitude = 106.8456;

    let menuData = [];
    let cartData = {};
    let shippingCost = 0;
    let customerInfo = null;

    async function loadConfig() {
      try {
        const configUrl = gasUrl + '?action=getConfig';
        const response = await fetch(configUrl);
        
        if (response.ok) {
          const data = await response.json();
          
          // Update lokasi toko
          if (data.latitude && data.longitude) {
            store_latitude = parseFloat(data.latitude);
            store_longitude = parseFloat(data.longitude);
          }
          
          // Update ongkir dari spreadsheet
          if (data.base_shipping_cost) {
            config.base_shipping_cost = parseFloat(data.base_shipping_cost);
          }
          if (data.shipping_cost_per_km) {
            config.shipping_cost_per_km = parseFloat(data.shipping_cost_per_km);
          }
          if (data.free_shipping_min_distance) {
            config.free_shipping_min_distance = parseFloat(data.free_shipping_min_distance);
          }
          
          // Update payment settings - load from custom config
          if (data.enable_cod !== undefined) config.enable_cod = data.enable_cod;
          if (data.enable_qris !== undefined) config.enable_qris = data.enable_qris;
          if (data.enable_ipaymu !== undefined) config.enable_ipaymu = data.enable_ipaymu;
          
          console.log('Config dimuat dari GAS');
          console.log('  Lokasi:', store_latitude, store_longitude);
          console.log('  Ongkir:', config.base_shipping_cost, '+', config.shipping_cost_per_km, '/km');
          console.log('  Pembayaran - COD:', config.enable_cod, 'QRIS:', config.enable_qris, 'IPAYMU:', config.enable_ipaymu);
        }
      } catch (error) {
        console.warn('Gagal memuat config dari GAS, menggunakan default');
      }
    }

    async function loadCustomerInfo() {
      if (!customerPhone) {
        console.log('Tidak ada phone di URL, mode guest');
        return;
      }
      
      try {
        const customerUrl = gasUrl + '?action=getCustomer&phone=' + encodeURIComponent(customerPhone);
        const response = await fetch(customerUrl);
        
        if (response.ok) {
          const data = await response.json();
          if (data && data.nama) {
            customerInfo = data;
            console.log('Customer dimuat:', customerInfo.nama);
          }
        }
      } catch (error) {
        console.warn('Gagal memuat customer info');
      }
    }

    async function loadMenu() {
      try {
        // Load config dulu
        await loadConfig();
        // Load customer info jika ada
        await loadCustomerInfo();
        
        const menuUrl = gasUrl + '?action=getMenu';
        const response = await fetch(menuUrl);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById('menu-list').innerHTML = '<div class="error-msg">MENU KOSONG. Pastikan data ada di sheet.</div>';
          return;
        }
        
        menuData = data.map(item => ({
          id: String(item.id),
          name: item.nama || '',
          desc: item.deskripsi || '',
          price: item.harga_diskon || item.harga || 0,
          originalPrice: item.harga_asli || 0,
          discountPercent: item.diskon_persen || 0,
          hasDiscount: item.has_discount || false,
          category: item.kategori || 'Lainnya',
          image: item.gambar || ''
        }));
        
        renderMenu();
      } catch (error) {
        console.error('Error loading menu:', error);
        document.getElementById('menu-list').innerHTML = '<div class="error-msg">Gagal memuat menu. Cek koneksi atau GAS URL.</div>';
      }
    }

    function formatPrice(price) {
      return price.toLocaleString('id-ID');
    }

    function renderMenu() {
      const container = document.getElementById('menu-list');
      container.innerHTML = '';
      
      menuData.forEach(item => {
        const hasImage = item.image && item.image.startsWith('data:');
        
        // Build price HTML
        let priceHtml = '';
        if (item.hasDiscount && item.originalPrice > item.price) {
          priceHtml = `
            <span class="original-price">Rp ${formatPrice(item.originalPrice)}</span>
            <span class="discount-badge">-${item.discountPercent}%</span>
            <br>
            <span>Rp ${formatPrice(item.price)}</span>
          `;
        } else {
          priceHtml = `Rp ${formatPrice(item.price)}`;
        }
        
        const html = `
          <div class="menu-item">
            <div class="menu-image">
              ${hasImage 
                ? `<img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='[Gambar]';" />` 
                : '[Gambar]'}
            </div>
            <div class="menu-content">
              <h3 class="menu-name">${escapeHtml(item.name)}</h3>
              <span class="menu-category">${escapeHtml(item.category)}</span>
              <p class="menu-desc">${escapeHtml(item.desc)}</p>
              <div class="menu-footer">
                <div class="menu-price">${priceHtml}</div>
                <button class="add-btn" onclick="addToCart('${item.id}', '${item.name}', ${item.price})">+</button>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&',
        '<': '<',
        '>': '>',
        '"': '"',
        "'": '&#039;'
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function addToCart(id, name, price) {
      if (!cartData[id]) {
        cartData[id] = { name, price, qty: 0 };
      }
      cartData[id].qty++;
      updateCart();
      document.getElementById('cart-section').classList.add('open');
    }

    function updateCart() {
      const items = Object.entries(cartData);
      const cartContainer = document.getElementById('cart-items');
      const summaryDiv = document.getElementById('cart-summary');
      const badge = document.getElementById('cart-badge');
      
      // Update badge count
      const totalItems = Object.values(cartData).reduce((sum, item) => sum + item.qty, 0);
      if (totalItems > 0) {
        badge.textContent = totalItems;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
      
      if (items.length === 0) {
        cartContainer.innerHTML = '<div class="cart-empty">Keranjang kosong</div>';
        summaryDiv.style.display = 'none';
        return;
      }
      
      cartContainer.innerHTML = '';
      let total = 0;
      
      items.forEach(([id, item]) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        
        const html = `
          <div class="cart-item">
            <div class="cart-item-info">
              <div class="cart-item-name">${escapeHtml(item.name)}</div>
              <div class="cart-item-price">${formatPrice(item.price)} x ${item.qty}</div>
            </div>
            <div class="cart-qty">
              <button class="qty-btn" onclick="changeQty('${id}', -1)">-</button>
              <span style="min-width: 30px; text-align: center; font-weight: bold;">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
            </div>
            <button class="cart-remove" onclick="removeFromCart('${id}')">x</button>
          </div>
        `;
        cartContainer.innerHTML += html;
      });
      
      document.getElementById('subtotal').textContent = `${formatPrice(total)}`;
      document.getElementById('total').textContent = `${formatPrice(total + shippingCost)}`;
      summaryDiv.style.display = 'block';
    }

    function generateOrderId() {
      return 'ORD-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9).toUpperCase();

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function calculateShippingCost(distance) {
      const baseCost = config.base_shipping_cost;
      const costPerKm = config.shipping_cost_per_km;
      const freeMinDistance = config.free_shipping_min_distance || 0;
      
      // Gratis ongkir jika jarak <= minimum
      if (distance <= freeMinDistance && freeMinDistance > 0) {
        return 0;
      }
      
      const additionalCost = Math.ceil(distance) * costPerKm;
      return baseCost + additionalCost;
    }

    async function generateQRIS(amount) {
      try {
        const response = await fetch('https://temanqris.com/api/qris/generate', {
          method: 'POST',
          headers: {
            'X-API-Key': config.qris_api_key,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            amount: amount,
            fee_type: 'rupiah',
            fee_value: config.qris_fee
          })
        });

        if (!response.ok) {
          throw new Error(`QRIS API error: ${response.status}`);
        }

        const data = await response.json();
        
        if (!data.success) {
          throw new Error('Gagal generate QRIS');
        }

        return {
          success: true,
          qr_image: data.qr_image,
          qris_string: data.qris,
          link_code: data.link_code,
          amount: data.amount,
          fee: data.fee,
          expires_at: data.expires_at
        };
      } catch (error) {
        console.error('Error generating QRIS:', error);
        return {
          success: false,
          error: error.message
        };
      }
    }

        // QR Code
        const qrImage = document.createElement('img');
        qrImage.src = paymentData.qr_image;
        qrImage.alt = 'IPAYMU QR';
        qrImage.style.cssText = 'width: 200px; height: 200px; margin: 0 auto 12px auto; display: block;';
        paymentContainer.appendChild(qrImage);
      } else if (paymentData.payment_code) {
        paymentDetailsHtml = `
          <p style="margin: 0 0 8px 0; font-size: 14px; color: #666;">Kode Pembayaran</p>
          <p style="margin: 0; font-size: 20px; font-weight: bold; color: #FF4500;">${paymentData.payment_code}</p>
        `;
      } else {
        paymentDetailsHtml = `
          <p style="margin: 0; font-size: 14px; color: #666;">Silakan lakukan pembayaran sesuai instruksi</p>
        `;
      }

      if (paymentDetailsHtml) {
        const detailsDiv = document.createElement('div');
        detailsDiv.innerHTML = paymentDetailsHtml;
        paymentContainer.appendChild(detailsDiv);
      }

      const total = Object.values(cartData).reduce((sum, item) => sum + (item.price * item.qty), 0);
      const totalWithShipping = total + shippingCost;

      const amountDiv = document.createElement('div');
      amountDiv.style.cssText = `
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        margin-top: 12px;
      `;
      amountDiv.innerHTML = `
        <p style="margin: 0; font-weight: 600; color: #1F2937; font-size: 18px;">${formatPrice(totalWithShipping)}</p>
        <p style="margin: 4px 0 0 0; font-size: 12px; color: #666;">Subtotal: ${formatPrice(total)} + Ongkir: ${formatPrice(shippingCost)}</p>
      `;
      paymentContainer.appendChild(amountDiv);

      content.appendChild(paymentContainer);

      const btnContainer = document.createElement('div');
      btnContainer.style.cssText = 'display: flex; gap: 12px;';

      const confirmBtn = document.createElement('button');
      confirmBtn.textContent = 'SUDAH BAYAR';
      confirmBtn.style.cssText = `
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      `;
      confirmBtn.onmouseover = () => confirmBtn.style.transform = 'translateY(-2px)';
      confirmBtn.onmouseout = () => confirmBtn.style.transform = 'translateY(0)';
      confirmBtn.onclick = async () => {
        processOrder(paymentMethod, customerName, customerPhone, customerAddress, latitude, longitude, ipaymuModal, paymentData);
      };
      btnContainer.appendChild(confirmBtn);

      const backBtn = document.createElement('button');
      backBtn.textContent = 'Kembali';
      backBtn.style.cssText = `
        flex: 1;
        padding: 12px;
        background: #f0f0f0;
        color: #666;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      `;
      backBtn.onmouseover = () => backBtn.style.background = '#e0e0e0';
      backBtn.onmouseout = () => backBtn.style.background = '#f0f0f0';
      backBtn.onclick = () => ipaymuModal.remove();
      btnContainer.appendChild(backBtn);

      content.appendChild(btnContainer);
      ipaymuModal.appendChild(content);
      document.body.appendChild(ipaymuModal);
    }

    async function processOrder(paymentMethod, customerName, customerPhone, customerAddress, latitude, longitude, formModal, qrisData = null) {
      const loadingModal = document.createElement('div');
      loadingModal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1001;
        overflow-y: auto;
      `;

      const loadingContent = document.createElement('div');
      loadingContent.style.cssText = `
        background: white;
        border-radius: 12px;
        padding: 40px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        text-align: center;
        margin: 20px auto;
      `;

      const spinner = document.createElement('div');
      spinner.style.cssText = `
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 4px solid #FF4500;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      `;
      loadingContent.appendChild(spinner);

      const loadingText = document.createElement('p');
      loadingText.textContent = 'Memproses...';
      loadingText.style.cssText = `
        margin: 0;
        font-size: 16px;
        color: #1F2937;
        font-weight: 600;
      `;
      loadingContent.appendChild(loadingText);

      loadingModal.appendChild(loadingContent);
      document.body.appendChild(loadingModal);

      if (formModal && formModal.remove) {
        formModal.remove();
      }

      try {
        const orderId = generateOrderId();
        const items = Object.entries(cartData).map(([_, item]) => ({
          name: item.name,
          price: item.price,
          qty: item.qty
        }));
        const subtotal = Object.values(cartData).reduce((sum, item) => sum + (item.price * item.qty), 0);
        const totalWithShipping = subtotal + shippingCost;

        let locationString = '';
        if (latitude && longitude && !isNaN(latitude) && !isNaN(longitude)) {
          locationString = `https://maps.google.com/?q=${latitude},${longitude}`;
        }

        let qrisInfo = '';
        if (paymentMethod === 'QRIS' && qrisData && qrisData.success) {
          qrisInfo = `QRIS: ${qrisData.qris_string}`;
        }
        
        let ipaymuInfo = '';
        if (paymentMethod === 'IPAYMU' && qrisData && (qrisData.payment_id || qrisData.va_number || qrisData.payment_code)) {
          ipaymuInfo = `IPAYMU: ${qrisData.payment_id || qrisData.va_number || qrisData.payment_code}`;
        }

        const gasWebhookUrl = config.gas_url_bot;
        
        const orderPayload = {
          action: 'ORDER',
          order_id: orderId,
          customer_name: customerName,
          customer_phone: customerPhone,
          customer_address: customerAddress,
          latitude: latitude,
          longitude: longitude,
          location_url: locationString,
          items: items,
          subtotal: subtotal,
          shipping_cost: shippingCost,
          discount: 0,
          total: totalWithShipping,
          payment_method: paymentMethod,
          qris_info: qrisInfo,
          ipaymu_info: ipaymuInfo,
          timestamp: new Date().toISOString()
        };

        console.log('Sending order:', orderPayload);

        const response = await fetch(gasWebhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(orderPayload),
          mode: 'no-cors'
        });

        cartData = {};
        updateCart();

        loadingText.textContent = 'PESANAN DIKIRIM!';
        loadingText.style.color = '#10B981';
        spinner.style.display = 'none';
        
        const successContent = document.createElement('div');
        successContent.style.cssText = `
          font-size: 14px;
          color: #666;
          margin-top: 20px;
          line-height: 1.6;
        `;
        
        successContent.innerHTML = `
          <p><strong>Order ID:</strong> ${orderId}</p>
          <p>WhatsApp akan dikirim ke ${customerPhone}</p>
          <p style="color: #10B981; font-weight: 600; margin-top: 12px;">Terima kasih!</p>
        `;
        
        loadingContent.appendChild(successContent);

        const closeBtn = document.createElement('button');
        closeBtn.textContent = 'TUTUP';
        closeBtn.style.cssText = `
          margin-top: 20px;
          padding: 12px 24px;
          background: linear-gradient(135deg, #FF4500 0%, #DC143C 100%);
          color: white;
          border: none;
          border-radius: 6px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: transform 0.2s;
        `;
        closeBtn.onmouseover = () => closeBtn.style.transform = 'translateY(-2px)';
        closeBtn.onmouseout = () => closeBtn.style.transform = 'translateY(0)';
        closeBtn.onclick = () => loadingModal.remove();
        loadingContent.appendChild(closeBtn);

      } catch (error) {
        console.error('Error:', error);
        
        loadingText.textContent = 'GAGAL';
        loadingText.style.color = '#c33';
        spinner.style.display = 'none';
        
        const errorContent = document.createElement('div');
        errorContent.style.cssText = `
          font-size: 14px;
          color: #666;
          margin-top: 20px;
          line-height: 1.6;
        `;
        errorContent.innerHTML = `
          <p>Coba lagi atau hubungi toko.</p>
        `;
        loadingContent.appendChild(errorContent);

        const closeBtn = document.createElement('button');
        closeBtn.textContent = 'Tutup';
        closeBtn.style.cssText = `
          margin-top: 20px;
          padding: 12px 24px;
          background: #f0f0f0;
          color: #666;
          border: none;
          border-radius: 6px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
        `;
        closeBtn.onclick = () => loadingModal.remove();
        loadingContent.appendChild(closeBtn);
      }
    }

    document.getElementById('checkout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      if (Object.keys(cartData).length === 0) {
        alert('Keranjang kosong!');
        return;
      }
      document.getElementById('cart-section').classList.remove('open');
      showPaymentModal();
    });

    document.getElementById('cart-close-btn').addEventListener('click', () => {
      document.getElementById('cart-section').classList.remove('open');
    });

    function toggleCart() {
      const cartSection = document.getElementById('cart-section');
      if (Object.keys(cartData).length === 0) {
        alert('Keranjang kosong!');
        return;
      }
      cartSection.classList.toggle('open');
    }

    loadMenu();
  </script>
 </body>
</html>
