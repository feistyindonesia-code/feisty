<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Feisty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .offline-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    .offline-icon {
      font-size: 80px;
      color: #667eea;
      margin-bottom: 20px;
    }
    .btn-feisty {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 12px 30px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <i class="bi bi-wifi-off"></i>
    </div>
    <h2 class="mb-3">Tidak Ada Koneksi</h2>
    <p class="text-muted mb-4">
      Sepertinya Anda sedang offline. Silakan cek koneksi internet Anda dan coba lagi.
    </p>
    <button onclick="window.location.reload()" class="btn btn-primary btn-feisty">
      <i class="bi bi-arrow-clockwise me-2"></i>Coba Lagi
    </button>
    <div class="mt-4">
      <small class="text-muted">
        Feisty Bot v2.1
      </small>
    </div>
  </div>
</body>
</html>
